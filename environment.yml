name: isostack
# All packages come from conda-forge. Do NOT mix a pip-installed PySide6 with the
# conda-forge qt6-main that VTK pulls in: two Qt6 builds of the same version shadow
# each other's DLLs and crash on import. Keeping the whole Qt/VTK stack on
# conda-forge keeps them ABI-consistent.
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy
  - scipy
  - pandas
  - pyvista
  - vtk
  - pyvistaqt
  - pyside6
  # Real EEG/MEG import (EDF/FIF/BrainVision/EEGLAB) + dataset downloads. Use
  # mne-base, not the full mne metapackage: base depends only on numpy/scipy and
  # avoids pulling a second Qt binding that would clash with the pyside6 above.
  - mne-base
  - pooch
